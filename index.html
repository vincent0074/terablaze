<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terablaze · Investment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <style>
        /* ----- Reset & Base ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: #0b0a1a;
            background: linear-gradient(-45deg, #0b0a1a, #1a1040, #0f2b45, #1a1040);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ----- Glowing Orbs ----- */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            z-index: 0;
            animation: floatOrb 20s ease-in-out infinite alternate;
        }
        .orb-1 { width: 400px; height: 400px; background: #7c3aed; top: -10%; left: -10%; }
        .orb-2 { width: 500px; height: 500px; background: #2563eb; bottom: -20%; right: -15%; animation-duration: 25s; animation-delay: -5s; }
        .orb-3 { width: 300px; height: 300px; background: #06b6d4; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.2; animation-duration: 18s; animation-delay: -2s; }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 60px) scale(1.2); }
        }

        /* ----- Main Glass Card ----- */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 520px;
            max-height: 95vh;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.15);
            padding: 2rem 2rem 2.5rem;
            transition: all 0.3s ease;
        }
        .container::-webkit-scrollbar { width: 4px; }
        .container::-webkit-scrollbar-track { background: transparent; }
        .container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        /* ----- Brand ----- */
        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }
        .brand-icon { font-size: 2.8rem; display: inline-block; animation: floatIcon 3s ease-in-out infinite; }
        @keyframes floatIcon {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }
        .brand h1 {
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-top: 0.2rem;
            background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(167, 139, 250, 0.3);
        }
        .brand p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: -0.2rem;
        }

        /* ----- Login Form ----- */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .form-group label {
            font-weight: 600;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .form-group input {
            padding: 0.9rem 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            outline: none;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            border-color: #7c3aed;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.25);
        }
        .form-group input::placeholder { color: rgba(255, 255, 255, 0.3); }
        .login-btn {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: white;
            font-weight: 700;
            font-size: 1.05rem;
            padding: 0.9rem;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 0.3rem;
            font-family: inherit;
            box-shadow: 0 8px 30px rgba(79, 70, 229, 0.35);
        }
        .login-btn:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 12px 40px rgba(79, 70, 229, 0.5); }
        .login-btn:active { transform: scale(0.97); }
        .error-msg {
            color: #f87171;
            font-size: 0.85rem;
            font-weight: 500;
            text-align: center;
            min-height: 1.6rem;
            margin-top: -0.3rem;
        }

        /* ----- Dashboard ----- */
        .dashboard {
            display: none;
            animation: fadeSlide 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(30px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .welcome {
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.2;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }
        .welcome strong {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Account meta */
        .account-meta {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.8rem;
        }
        .account-meta span strong { color: rgba(255, 255, 255, 0.7); font-weight: 600; }

        /* Balance Card */
        .balance-card {
            background: linear-gradient(145deg, rgba(30, 27, 75, 0.8), rgba(20, 15, 50, 0.9));
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 1.8rem 2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }
        .balance-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.2), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .balance-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
        }
        .balance-amount {
            font-size: 3rem;
            font-weight: 800;
            color: white;
            margin-top: 0.2rem;
            letter-spacing: -0.02em;
            position: relative;
            z-index: 2;
        }
        .balance-amount small {
            font-size: 1.4rem;
            font-weight: 500;
            opacity: 0.5;
            margin-left: 0.3rem;
        }

        /* Action Buttons */
        .action-row {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.8rem;
        }
        .action-btn {
            flex: 1;
            padding: 0.8rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            letter-spacing: 0.3px;
        }
        .action-btn.deposit {
            background: linear-gradient(135deg, #34d399, #059669);
            color: white;
            box-shadow: 0 8px 24px rgba(52, 211, 153, 0.3);
        }
        .action-btn.deposit:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(52, 211, 153, 0.4); }
        .action-btn.withdraw {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .action-btn.withdraw:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-2px); }

        /* Transaction History */
        .tx-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }
        .tx-header span {
            font-weight: 600;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .tx-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .tx-list::-webkit-scrollbar { width: 3px; }
        .tx-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: background 0.2s;
        }
        .transaction-item:hover { background: rgba(255, 255, 255, 0.06); }
        .tx-left { display: flex; align-items: center; gap: 0.8rem; }
        .tx-icon {
            width: 38px; height: 38px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .tx-icon.deposit-icon { background: rgba(52, 211, 153, 0.15); border: 1px solid rgba(52, 211, 153, 0.15); }
        .tx-icon.withdraw-icon { background: rgba(248, 113, 113, 0.15); border: 1px solid rgba(248, 113, 113, 0.15); }
        .tx-info { display: flex; flex-direction: column; gap: 0.1rem; }
        .tx-type { font-weight: 700; color: #ffffff; font-size: 0.9rem; }
        .tx-date { font-size: 0.7rem; color: rgba(255, 255, 255, 0.35); }
        .tx-amount { font-weight: 700; font-size: 1rem; }
        .tx-amount.positive { color: #34d399; }
        .tx-amount.negative { color: #f87171; }

        /* Logout */
        .logout-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
            padding: 0.7rem;
            border-radius: 60px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 1.8rem;
            font-family: inherit;
            width: 100%;
        }
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #ffffff;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .container { padding: 1.5rem; border-radius: 32px; max-height: 98vh; }
            .brand h1 { font-size: 2.2rem; }
            .welcome { font-size: 1.6rem; }
            .balance-amount { font-size: 2.4rem; }
            .account-meta { flex-direction: column; gap: 0.3rem; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="container" id="appContainer">
        <!-- Brand -->
        <div class="brand">
            <div class="brand-icon">⚡</div>
            <h1>tera<span style="background: linear-gradient(135deg, #60a5fa, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">blaze</span></h1>
            <p>Invest · Grow · Ignite</p>
        </div>

        <!-- ===== LOGIN ===== -->
        <div id="loginSection">
            <form id="loginForm" class="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" value="Christine" />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" value="Angel0074" />
                </div>
                <div id="loginError" class="error-msg"></div>
                <button type="submit" class="login-btn">→ Sign In</button>
            </form>
        </div>

        <!-- ===== DASHBOARD ===== -->
        <div id="dashboardSection" class="dashboard">
            <!-- Welcome -->
            <div class="welcome">Hi <strong id="userDisplayName">Christine Angel</strong></div>

            <!-- Account Meta -->
            <div class="account-meta">
                <span>📁 <strong>#TBZ-10042</strong></span>
                <span>📅 <strong>Member since 2026</strong></span>
            </div>

            <!-- Balance -->
            <div class="balance-card">
                <div class="balance-label">Account Balance</div>
                <div class="balance-amount" id="balanceDisplay">$200 <small>USD</small></div>
            </div>

            <!-- Action Buttons -->
            <div class="action-row">
                <button class="action-btn deposit" id="depositBtn">+ Deposit</button>
                <button class="action-btn withdraw" id="withdrawBtn">− Withdraw</button>
            </div>

            <!-- Transaction History -->
            <div class="tx-header">
                <span>Recent Transactions</span>
                <span style="font-size:0.6rem; opacity:0.3;" id="txCount">0 entries</span>
            </div>
            <div class="tx-list" id="transactionList">
                <!-- Dynamically rendered -->
            </div>

            <!-- Logout -->
            <button id="logoutBtn" class="logout-btn">Sign Out</button>
        </div>
    </div>

    <script>
        (function() {
            // --- DOM refs ---
            const loginSection = document.getElementById('loginSection');
            const dashboardSection = document.getElementById('dashboardSection');
            const loginForm = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const loginError = document.getElementById('loginError');
            const userDisplayName = document.getElementById('userDisplayName');
            const logoutBtn = document.getElementById('logoutBtn');
            const balanceDisplay = document.getElementById('balanceDisplay');
            const transactionList = document.getElementById('transactionList');
            const txCount = document.getElementById('txCount');
            const depositBtn = document.getElementById('depositBtn');
            const withdrawBtn = document.getElementById('withdrawBtn');

            // --- Credentials ---
            const VALID_USERNAME = 'Christine';
            const VALID_PASSWORD = 'Angel0074';
            const FULL_NAME = 'Christine Angel';

            // --- Data State ---
            let balance = 200;
            let transactions = [
                { type: 'deposit', amount: 200, date: '3 July 2026 · 7:40' },
                { type: 'deposit', amount: 50, date: '1 July 2026 · 09:15' },
                { type: 'withdraw', amount: 30, date: '30 June 2026 · 14:20' }
            ];

            // --- Helper: Format currency ---
            function formatCurrency(amount) {
                return '$' + amount.toFixed(2);
            }

            // --- Render UI ---
            function renderDashboard() {
                // Update balance
                balanceDisplay.innerHTML = `${formatCurrency(balance)} <small>USD</small>`;

                // Sort transactions: newest first (by date descending, simple string compare works here)
                const sorted = [...transactions].sort((a, b) => b.date.localeCompare(a.date));

                // Render list
                transactionList.innerHTML = '';
                sorted.forEach(tx => {
                    const item = document.createElement('div');
                    item.className = 'transaction-item';

                    const isDeposit = tx.type === 'deposit';
                    const iconClass = isDeposit ? 'deposit-icon' : 'withdraw-icon';
                    const iconSymbol = isDeposit ? '↓' : '↑';
                    const amountClass = isDeposit ? 'positive' : 'negative';
                    const amountSign = isDeposit ? '+' : '-';

                    item.innerHTML = `
                        <div class="tx-left">
                            <div class="tx-icon ${iconClass}">${iconSymbol}</div>
                            <div class="tx-info">
                                <span class="tx-type">${tx.type.charAt(0).toUpperCase() + tx.type.slice(1)}</span>
                                <span class="tx-date">${tx.date}</span>
                            </div>
                        </div>
                        <div class="tx-amount ${amountClass}">${amountSign}${formatCurrency(tx.amount)}</div>
                    `;
                    transactionList.appendChild(item);
                });

                // Update counter
                txCount.textContent = `${transactions.length} entries`;
            }

            // --- Add transaction ---
            function addTransaction(type, amount) {
                if (amount <= 0) {
                    alert('Amount must be greater than zero.');
                    return false;
                }

                if (type === 'withdraw' && amount > balance) {
                    alert('Insufficient balance. You cannot withdraw more than you have.');
                    return false;
                }

                // Update balance
                if (type === 'deposit') {
                    balance += amount;
                } else {
                    balance -= amount;
                }

                // Add to history
                const now = new Date();
                const dateStr = `${now.getDate()} ${now.toLocaleString('default', { month: 'long' })} ${now.getFullYear()} · ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
                transactions.push({ type, amount, date: dateStr });

                renderDashboard();
                return true;
            }

            // --- Show/Hide sections ---
            function showDashboard() {
                loginSection.style.display = 'none';
                dashboardSection.style.display = 'block';
                userDisplayName.textContent = FULL_NAME;
                loginError.textContent = '';
                renderDashboard();
            }

            function showLogin() {
                loginSection.style.display = 'block';
                dashboardSection.style.display = 'none';
                loginError.textContent = '';
                passwordInput.value = '';
                usernameInput.value = VALID_USERNAME;
            }

            // --- Event Listeners ---
            // Login
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();

                if (username === VALID_USERNAME && password === VALID_PASSWORD) {
                    showDashboard();
                } else {
                    loginError.textContent = 'Invalid credentials. Please try again.';
                }
            });

            // Logout
            logoutBtn.addEventListener('click', showLogin);

            // Deposit
            depositBtn.addEventListener('click', function() {
                const input = prompt('Enter deposit amount:', '100');
                if (input === null) return; // cancelled
                const amount = parseFloat(input);
                if (!isNaN(amount)) {
                    addTransaction('deposit', amount);
                } else {
                    alert('Please enter a valid number.');
                }
            });

            // Withdraw
            withdrawBtn.addEventListener('click', function() {
                const input = prompt('Enter withdrawal amount:', '50');
                if (input === null) return;
                const amount = parseFloat(input);
                if (!isNaN(amount)) {
                    addTransaction('withdraw', amount);
                } else {
                    alert('Please enter a valid number.');
                }
            });

            // Prefill login
            usernameInput.value = VALID_USERNAME;
        })();
    </script>
</body>
</html>
