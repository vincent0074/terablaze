<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terablaze · Investment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <style>
        /* ----- Reset & Base ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: #0b0a1a;
            /* Animated gradient background */
            background: linear-gradient(-45deg, #0b0a1a, #1a1040, #0f2b45, #1a1040);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ----- Glowing Orbs (background decoration) ----- */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            z-index: 0;
            animation: floatOrb 20s ease-in-out infinite alternate;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: #7c3aed;
            top: -10%;
            left: -10%;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: #2563eb;
            bottom: -20%;
            right: -15%;
            animation-duration: 25s;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: #06b6d4;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.2;
            animation-duration: 18s;
            animation-delay: -2s;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 60px) scale(1.2); }
        }

        /* ----- Main Glass Card ----- */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.15);
            padding: 2rem 2rem 2.5rem;
            transition: all 0.3s ease;
        }

        /* ----- Brand ----- */
        .brand {
            text-align: center;
            margin-bottom: 2.2rem;
        }

        .brand-icon {
            font-size: 2.8rem;
            display: inline-block;
            animation: floatIcon 3s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }

        .brand h1 {
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-top: 0.2rem;
            background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(167, 139, 250, 0.3);
        }

        .brand p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: -0.2rem;
        }

        /* ----- Login Form ----- */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .form-group label {
            font-weight: 600;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .form-group input {
            padding: 0.9rem 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            outline: none;
            font-family: inherit;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .form-group input:focus {
            border-color: #7c3aed;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.25), inset 0 0 20px rgba(124, 58, 237, 0.05);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-group input:-webkit-autofill {
            background: transparent !important;
            color: white !important;
        }

        .login-btn {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: white;
            font-weight: 700;
            font-size: 1.05rem;
            padding: 0.9rem;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 0.3rem;
            font-family: inherit;
            letter-spacing: 0.3px;
            box-shadow: 0 8px 30px rgba(79, 70, 229, 0.35);
            position: relative;
            overflow: hidden;
        }

        .login-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .login-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 12px 40px rgba(79, 70, 229, 0.5);
        }

        .login-btn:hover::after {
            opacity: 1;
        }

        .login-btn:active {
            transform: scale(0.97);
        }

        .error-msg {
            color: #f87171;
            font-size: 0.85rem;
            font-weight: 500;
            text-align: center;
            min-height: 1.6rem;
            margin-top: -0.3rem;
            text-shadow: 0 0 20px rgba(248, 113, 113, 0.3);
        }

        /* ----- Dashboard (hidden by default) ----- */
        .dashboard {
            display: none;
            animation: fadeSlide 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(30px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .welcome {
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.2;
            margin-bottom: 1.8rem;
            letter-spacing: -0.02em;
        }

        .welcome strong {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(251, 191, 36, 0.25);
        }

        /* Balance Card (premium dark glow) */
        .balance-card {
            background: linear-gradient(145deg, rgba(30, 27, 75, 0.8), rgba(20, 15, 50, 0.9));
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 1.8rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .balance-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.2), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .balance-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
        }

        .balance-amount {
            font-size: 3rem;
            font-weight: 800;
            color: white;
            margin-top: 0.2rem;
            letter-spacing: -0.02em;
            position: relative;
            z-index: 2;
            text-shadow: 0 0 40px rgba(167, 139, 250, 0.2);
        }

        .balance-amount small {
            font-size: 1.4rem;
            font-weight: 500;
            opacity: 0.5;
            margin-left: 0.3rem;
        }

        /* Transaction */
        .tx-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .tx-header span {
            font-weight: 600;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .tx-header .tx-view-all {
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.7rem;
            cursor: default;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0.5rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            padding: 0.9rem 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: background 0.2s;
        }

        .tx-left {
            display: flex;
            align-items: center;
            gap: 0.9rem;
        }

        .tx-icon {
            width: 44px;
            height: 44px;
            background: rgba(52, 211, 153, 0.15);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            border: 1px solid rgba(52, 211, 153, 0.15);
        }

        .tx-info {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .tx-type {
            font-weight: 700;
            color: #ffffff;
            font-size: 1rem;
        }

        .tx-type .deposit-badge {
            background: rgba(52, 211, 153, 0.15);
            color: #34d399;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 0.15rem 0.7rem;
            border-radius: 30px;
            margin-left: 0.5rem;
            border: 1px solid rgba(52, 211, 153, 0.15);
        }

        .tx-date {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.35);
        }

        .tx-amount {
            font-weight: 700;
            font-size: 1.1rem;
            color: #34d399;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 2rem;
            font-family: inherit;
            width: 100%;
            letter-spacing: 0.3px;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
            color: #ffffff;
            transform: translateY(-1px);
        }

        /* ----- Responsive ----- */
        @media (max-width: 500px) {
            .container {
                padding: 1.5rem;
                border-radius: 32px;
            }
            .brand h1 {
                font-size: 2.2rem;
            }
            .welcome {
                font-size: 1.6rem;
            }
            .balance-amount {
                font-size: 2.4rem;
            }
            .tx-icon {
                width: 38px;
                height: 38px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <!-- Background Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Main App -->
    <div class="container" id="appContainer">

        <!-- Brand -->
        <div class="brand">
            <div class="brand-icon">⚡</div>
            <h1>tera<span style="background: linear-gradient(135deg, #60a5fa, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">blaze</span></h1>
            <p>Invest · Grow · Ignite</p>
        </div>

        <!-- ===== LOGIN ===== -->
        <div id="loginSection">
            <form id="loginForm" class="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" value="Christine" />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" value="Angel0074" />
                </div>
                <div id="loginError" class="error-msg"></div>
                <button type="submit" class="login-btn">→ Sign In</button>
            </form>
        </div>

        <!-- ===== DASHBOARD ===== -->
        <div id="dashboardSection" class="dashboard">
            <!-- Welcome -->
            <div class="welcome">
                Hi <strong id="userDisplayName">Christine Angel</strong>
            </div>

            <!-- Balance -->
            <div class="balance-card">
                <div class="balance-label">Account Balance</div>
                <div class="balance-amount">
                    $200 <small>USD</small>
                </div>
            </div>

            <!-- Recent Transaction -->
            <div class="tx-header">
                <span>Recent Transaction</span>
                <span class="tx-view-all">latest</span>
            </div>

            <div class="transaction-item">
                <div class="tx-left">
                    <div class="tx-icon">↓</div>
                    <div class="tx-info">
                        <span class="tx-type">
                            Deposit
                            <span class="deposit-badge">+$200</span>
                        </span>
                        <span class="tx-date">3 July 2026 · 7:40</span>
                    </div>
                </div>
                <div class="tx-amount">+$200.00</div>
            </div>

            <!-- Logout -->
            <button id="logoutBtn" class="logout-btn">Sign Out</button>
        </div>
    </div>

    <script>
        (function() {
            const loginSection = document.getElementById('loginSection');
            const dashboardSection = document.getElementById('dashboardSection');
            const loginForm = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const loginError = document.getElementById('loginError');
            const userDisplayName = document.getElementById('userDisplayName');
            const logoutBtn = document.getElementById('logoutBtn');

            const VALID_USERNAME = 'Christine';
            const VALID_PASSWORD = 'Angel0074';
            const FULL_NAME = 'Christine Angel';

            function showDashboard() {
                loginSection.style.display = 'none';
                dashboardSection.style.display = 'block';
                userDisplayName.textContent = FULL_NAME;
                loginError.textContent = '';
            }

            function showLogin() {
                loginSection.style.display = 'block';
                dashboardSection.style.display = 'none';
                loginError.textContent = '';
                passwordInput.value = '';
                usernameInput.value = VALID_USERNAME;
            }

            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();

                if (username === VALID_USERNAME && password === VALID_PASSWORD) {
                    showDashboard();
                } else {
                    loginError.textContent = 'Invalid credentials. Please try again.';
                }
            });

            logoutBtn.addEventListener('click', function() {
                showLogin();
            });

            // Prefill
            usernameInput.value = VALID_USERNAME;
        })();
    </script>
</body>
</html>
